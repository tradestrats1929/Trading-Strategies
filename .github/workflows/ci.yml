name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install workspace deps
        run: uv sync

      - name: Run tests
        run: uv run pytest src/services/python/hello_api/tests/ src/services/python/db_api/tests/ -v

  typescript:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [hello_ui, db_ui]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/services/typescript/${{ matrix.app }}/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: src/services/typescript/${{ matrix.app }}

      - name: Typecheck
        run: npm run typecheck
        working-directory: src/services/typescript/${{ matrix.app }}

      - name: Build
        run: npm run build
        working-directory: src/services/typescript/${{ matrix.app }}
