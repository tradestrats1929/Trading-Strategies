name: trading-strategies-prod

services:
  hello_api:
    image: ghcr.io/tradestrats1929/trading-strategies/hello-api:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    command: python -m uvicorn hello_api.main:app --host 0.0.0.0 --port 8000 --root-path /prod/api/hello

  txn_cost_api:
    image: ghcr.io/tradestrats1929/trading-strategies/txn-cost-api:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8002"
    command: python -m uvicorn txn_cost_api.main:app --host 0.0.0.0 --port 8002 --root-path /prod/api/txn-cost

  system_monitor:
    image: ghcr.io/tradestrats1929/trading-strategies/system-monitor:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8004:8004"
    command: python -m uvicorn system_monitor.main:app --host 0.0.0.0 --port 8004 --root-path /prod/api/system-monitor
    environment:
      - SERVICE_NAME=system_monitor
      - HELLO_API_URL=http://hello_api:8000
      - TXN_COST_API_URL=http://txn_cost_api:8002
      - SELF_URL=http://system_monitor:8004
      - ANGEL_API_URL=http://angel_api:8006

  angel_api:
    image: ghcr.io/tradestrats1929/trading-strategies/angel-api:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8006:8006"
    command: python -m uvicorn angel_api.main:app --host 0.0.0.0 --port 8006 --root-path /prod/api/angel
    env_file:
      - path: .env
        required: false
    environment:
      - SERVICE_NAME=angel_api
      - APP_ENV=PROD
      - ANGEL_INTERNAL_SECRET=${ANGEL_INTERNAL_SECRET}
