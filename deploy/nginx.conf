# Trading Strategies — managed by CI deploy
server {
    listen 80;
    server_name trading-strategies.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name trading-strategies.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/trading-strategies.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trading-strategies.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Prod API services ────────────────────────────────────────────────────

    location /prod/api/hello/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /prod/api/txn-cost/ {
        proxy_pass         http://127.0.0.1:8002/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Dev API services ─────────────────────────────────────────────────────

    location /dev/api/hello/ {
        proxy_pass         http://127.0.0.1:8010/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /dev/api/txn-cost/ {
        proxy_pass         http://127.0.0.1:8012/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Prod UI (static, React Router) ───────────────────────────────────────

    location ^~ /prod/ {
        root       /var/www/trading-strategies-ui;
        try_files  $uri /prod/index.html;
        expires    1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Dev UI (static, React Router) ────────────────────────────────────────

    location ^~ /dev/ {
        root       /var/www/trading-strategies-ui;
        try_files  $uri /dev/index.html;
        expires    off;
        add_header Cache-Control "no-store";
    }
}
