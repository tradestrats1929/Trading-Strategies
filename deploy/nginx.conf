# Trading Strategies — managed by CI deploy (removes default site on first run)
server {
    listen 80;
    server_name trading-strategies.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name trading-strategies.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/trading-strategies.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trading-strategies.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── API services ────────────────────────────────────────────────────────

    location /api/hello/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/txn-cost/ {
        proxy_pass         http://127.0.0.1:8002/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Master UI (static, React Router) ────────────────────────────────────
    location / {
        root       /var/www/trading-strategies-ui;
        try_files  $uri $uri/ /index.html;
        expires    1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
